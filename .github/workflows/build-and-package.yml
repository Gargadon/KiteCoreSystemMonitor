name: Build and Package WinUI 3 App with NSIS

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Matches target framework net10.0

    - name: Publish Standalone Executable (Unpackaged with DLLs and Assets)
      run: |
        # Generates a self-contained publish folder containing the EXE, all DLLs, and the Assets directory for x64 and arm64
        dotnet publish windows\KiteCoreWindowsMonitor.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=false /p:WindowsPackageType=None
        dotnet publish windows\KiteCoreWindowsMonitor.csproj -c Release -r win-arm64 --self-contained true /p:PublishSingleFile=false /p:WindowsPackageType=None

    - name: Install NSIS
      run: |
        # Install Nullsoft Scriptable Install System (NSIS) via Chocolatey
        choco install nsis -y
        # Add NSIS compiler directory to the runner PATH
        echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

    - name: Compile NSIS Installer
      run: |
        # Run NSIS compiler to package the published files (EXE, DLLs, Assets) into setup installers
        makensis /DARCH=win-x64 windows\installer.nsi
        makensis /DARCH=win-arm64 windows\installer.nsi

    - name: Upload NSIS Installers (EXE)
      uses: actions/upload-artifact@v4
      with:
        name: KiteCoreSystemMonitor-NSIS-Installers
        path: |
          windows/bin/Release/net10.0-windows10.0.26100.0/win-x64/KiteCoreSystemMonitor_Setup_win-x64.exe
          windows/bin/Release/net10.0-windows10.0.26100.0/win-arm64/KiteCoreSystemMonitor_Setup_win-arm64.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          windows/bin/Release/net10.0-windows10.0.26100.0/win-x64/KiteCoreSystemMonitor_Setup_win-x64.exe
          windows/bin/Release/net10.0-windows10.0.26100.0/win-arm64/KiteCoreSystemMonitor_Setup_win-arm64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
